<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Will You Be Mine?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff85a1;
    --peach: #ffb347;
    --lilac: #c9a9e9;
    --blush: #ffd6e0;
    --rose: #ff4d79;
    --cream: #fff5f7;
    --night-bg: #0d0019;
    --night-glow: #6b0fa8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
  }

  /* ===================== BACKGROUND LAYERS ===================== */
  #scene {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 0;
    overflow: hidden;
  }

  /* Layer 1: Animated gradient */
  .bg-gradient {
    position: absolute; inset: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(
      135deg,
      #fce4ec 0%, #f8bbd0 10%,
      #e8d5f5 20%, #dceeff 30%,
      #ffecd2 40%, #fcb69f 50%,
      #ffecd2 60%, #dceeff 70%,
      #e8d5f5 80%, #f8bbd0 90%,
      #fce4ec 100%
    );
    background-size: 400% 400%;
    animation: gradientFlow 18s ease infinite;
  }
  @keyframes gradientFlow {
    0%   { background-position: 0% 0%; transform: rotate(0deg) scale(1); }
    25%  { background-position: 100% 0%; }
    50%  { background-position: 100% 100%; transform: rotate(2deg) scale(1.05); }
    75%  { background-position: 0% 100%; }
    100% { background-position: 0% 0%; transform: rotate(0deg) scale(1); }
  }

  /* Layer 2: Bokeh circles */
  .bokeh-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bokeh {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0;
    animation: bokehFloat var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes bokehFloat {
    0%   { opacity: 0; transform: translateY(20px) scale(0.8); }
    30%  { opacity: var(--op); }
    70%  { opacity: var(--op); }
    100% { opacity: 0; transform: translateY(-30px) scale(1.2); }
  }

  /* Layer 3: Sparkle stars */
  .sparkle-layer { position: absolute; inset: 0; pointer-events: none; }
  .sparkle {
    position: absolute;
    width: var(--sz); height: var(--sz);
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  .sparkle::before, .sparkle::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(255,200,220,0.9);
  }
  .sparkle::after {
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    background: rgba(255,220,230,0.95);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    20%       { opacity: 1; transform: scale(1) rotate(45deg); }
    80%       { opacity: 0.8; transform: scale(0.8) rotate(90deg); }
  }

  /* Layer 4: Falling hearts */
  .hearts-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .fall-heart {
    position: absolute;
    top: -60px;
    font-size: var(--sz);
    opacity: 0;
    animation: heartFall var(--dur) ease-in infinite var(--delay);
    filter: drop-shadow(0 0 4px rgba(255,100,150,0.5));
  }
  @keyframes heartFall {
    0%   { opacity: 0; transform: translateY(0) rotate(var(--rot)) scale(0.5); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(110vh) rotate(calc(var(--rot) + 360deg)) scale(1.2); }
  }

  /* Vignette */
  .vignette {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(180,100,140,0.25) 100%);
    z-index: 1;
  }

  /* ===================== MAIN CARD ===================== */
  .card {
    position: relative; z-index: 10;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,180,200,0.5);
    border-radius: 32px;
    padding: 44px 48px 40px;
    max-width: 520px; width: 92%;
    box-shadow:
      0 8px 40px rgba(255,100,150,0.18),
      0 2px 12px rgba(255,150,180,0.1),
      inset 0 1px 0 rgba(255,255,255,0.7);
    text-align: center;
    animation: cardEntrance 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(50px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Decorative top border glow */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff85a1, #e8a0d0, #ff85a1, transparent);
    border-radius: 0 0 50% 50%;
    box-shadow: 0 0 18px 4px rgba(255,133,161,0.5);
  }

  /* ===================== HEADING ===================== */
  .question-label {
    font-family: 'Dancing Script', cursive;
    font-size: 1.15rem;
    color: #c06080;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s ease both;
  }
  .question-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    font-weight: 700;
    color: #7a1f40;
    line-height: 1.25;
    margin-bottom: 6px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s ease both;
    text-shadow: 0 2px 20px rgba(255,100,140,0.2);
  }
  .question-sub {
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    color: #c07090;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===================== ANIMAL CHARACTER ===================== */
  .animal-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto 28px;
    opacity: 0;
    animation: fadeUp 1s 1.1s ease both;
  }

  /* CSS-drawn bunny */
  .bunny {
    position: relative;
    width: 120px; height: 140px;
    margin: 0 auto;
    cursor: pointer;
    animation: idleBreathe 3s ease-in-out infinite;
    transform-origin: bottom center;
    filter: drop-shadow(0 8px 16px rgba(255,150,180,0.35));
  }
  @keyframes idleBreathe {
    0%,100% { transform: scaleY(1) scaleX(1); }
    50%     { transform: scaleY(1.03) scaleX(0.98); }
  }

  /* Body */
  .bunny-body {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 90px;
    background: linear-gradient(160deg, #fff5f7 0%, #ffdde8 60%, #ffc8d8 100%);
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    box-shadow: 0 4px 20px rgba(255,150,180,0.25), inset 0 -4px 12px rgba(255,180,200,0.2);
  }

  /* Belly */
  .bunny-belly {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    width: 42px; height: 48px;
    background: linear-gradient(160deg, #fff0f4, #ffe4ed);
    border-radius: 50%;
    opacity: 0.85;
  }

  /* Head */
  .bunny-head {
    position: absolute;
    top: 28px; left: 50%;
    transform: translateX(-50%);
    width: 70px; height: 68px;
    background: linear-gradient(150deg, #fff5f7 0%, #ffdde8 70%, #ffc8d8 100%);
    border-radius: 50%;
    box-shadow: 0 2px 12px rgba(255,150,180,0.2);
    animation: headWobble 5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes headWobble {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    20%     { transform: translateX(-50%) rotate(2deg); }
    60%     { transform: translateX(-50%) rotate(-1.5deg); }
  }

  /* Ears */
  .bunny-ear {
    position: absolute;
    width: 22px; height: 58px;
    background: linear-gradient(180deg, #ffc8d8, #ffb0cc);
    border-radius: 50% 50% 30% 30%;
    top: -44px;
    box-shadow: inset 0 0 8px rgba(255,120,160,0.3);
  }
  .bunny-ear.left  { left: 8px;  transform: rotate(-8deg); animation: earLeft  4s ease-in-out infinite; }
  .bunny-ear.right { right: 8px; transform: rotate(8deg);  animation: earRight 4s ease-in-out infinite 0.5s; }
  .bunny-ear-inner {
    position: absolute;
    width: 12px; height: 42px;
    background: linear-gradient(180deg, #ffaac8, #ff9ab8);
    border-radius: 50%;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    opacity: 0.7;
  }
  @keyframes earLeft  { 0%,100%{transform:rotate(-8deg)} 40%{transform:rotate(-18deg)} 70%{transform:rotate(-4deg)} }
  @keyframes earRight { 0%,100%{transform:rotate(8deg)}  40%{transform:rotate(18deg)}  70%{transform:rotate(4deg)} }

  /* Eyes */
  .bunny-eye {
    position: absolute;
    width: 14px; height: 14px;
    background: #3a1a2a;
    border-radius: 50%;
    top: 24px;
    box-shadow: 0 0 0 2.5px rgba(255,255,255,0.9), inset 1px 1px 0 rgba(255,255,255,0.6);
  }
  .bunny-eye.left  { left: 12px; }
  .bunny-eye.right { right: 12px; }
  .bunny-eye::after {
    content: '';
    position: absolute;
    width: 5px; height: 5px;
    background: white;
    border-radius: 50%;
    top: 2px; left: 2px;
  }
  /* Blink */
  .bunny-eye { animation: blink 4s ease-in-out infinite; }
  .bunny-eye.right { animation-delay: 0.08s; }
  @keyframes blink {
    0%,48%,52%,100% { transform: scaleY(1); }
    50% { transform: scaleY(0.1); }
  }

  /* Blush */
  .bunny-blush {
    position: absolute;
    width: 16px; height: 9px;
    background: rgba(255,130,160,0.45);
    border-radius: 50%;
    top: 34px;
    filter: blur(3px);
    transition: opacity 0.4s;
  }
  .bunny-blush.left  { left: 7px; }
  .bunny-blush.right { right: 7px; }

  /* Nose */
  .bunny-nose {
    position: absolute;
    width: 10px; height: 7px;
    background: #ffaacc;
    border-radius: 50%;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 6px rgba(255,120,160,0.4);
  }

  /* Mouth */
  .bunny-mouth {
    position: absolute;
    top: 49px; left: 50%;
    transform: translateX(-50%);
    width: 22px; height: 10px;
    border-bottom: 2.5px solid rgba(220,100,140,0.6);
    border-radius: 0 0 50% 50%;
  }

  /* Arms */
  .bunny-arm {
    position: absolute;
    width: 22px; height: 36px;
    background: linear-gradient(160deg, #fff0f4, #ffc8d8);
    border-radius: 50%;
    bottom: 28px;
  }
  .bunny-arm.left  { left: -10px;  transform: rotate(25deg);  animation: armSwayL 3s ease-in-out infinite; transform-origin: top center; }
  .bunny-arm.right { right: -10px; transform: rotate(-25deg); animation: armSwayR 3s ease-in-out infinite 0.4s; transform-origin: top center; }
  @keyframes armSwayL { 0%,100%{transform:rotate(25deg)} 50%{transform:rotate(35deg)} }
  @keyframes armSwayR { 0%,100%{transform:rotate(-25deg)} 50%{transform:rotate(-35deg)} }

  /* Tail */
  .bunny-tail {
    position: absolute;
    width: 20px; height: 20px;
    background: white;
    border-radius: 50%;
    bottom: 20px; right: -8px;
    box-shadow: 0 2px 8px rgba(255,150,180,0.25);
    animation: tailWag 1.5s ease-in-out infinite;
    transform-origin: left center;
  }
  @keyframes tailWag { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(15deg)} }

  /* Feet */
  .bunny-foot {
    position: absolute;
    width: 30px; height: 16px;
    background: linear-gradient(90deg, #ffc8d8, #ffb0cc);
    border-radius: 50%;
    bottom: -5px;
  }
  .bunny-foot.left  { left: 6px; }
  .bunny-foot.right { right: 6px; }

  /* Heart above bunny on hover */
  .bunny-heart {
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%) scale(0);
    font-size: 1.5rem;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  /* YES hover state */
  .bunny-wrap-happy .bunny { animation: bunnyHappy 0.5s ease-in-out infinite alternate; }
  @keyframes bunnyHappy {
    from { transform: translateY(0) rotate(-3deg); }
    to   { transform: translateY(-8px) rotate(3deg); }
  }
  .bunny-wrap-happy .bunny-heart { transform: translateX(-50%) scale(1) translateY(-12px); opacity: 1; }
  .bunny-wrap-happy .bunny-blush { opacity: 1.5; }

  /* ===================== BUTTONS ===================== */
  .buttons-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .btn-yes {
    position: relative;
    padding: 14px 38px;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #ff4d79, #ff85a1, #e8507a);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    box-shadow:
      0 4px 20px rgba(255,77,121,0.45),
      0 1px 4px rgba(255,77,121,0.3),
      inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.25s ease,
                font-size 0.35s ease,
                padding 0.35s ease;
    transform-origin: center;
    letter-spacing: 0.04em;
    animation: yesGlow 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes yesGlow {
    0%,100% { box-shadow: 0 4px 20px rgba(255,77,121,0.45), 0 1px 4px rgba(255,77,121,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }
    50%     { box-shadow: 0 6px 30px rgba(255,77,121,0.65), 0 2px 8px rgba(255,77,121,0.4), inset 0 1px 0 rgba(255,255,255,0.3), 0 0 0 6px rgba(255,77,121,0.1); }
  }
  .btn-yes:hover {
    transform: scale(1.08) translateY(-2px);
    box-shadow:
      0 8px 36px rgba(255,77,121,0.6),
      0 2px 8px rgba(255,77,121,0.4),
      inset 0 1px 0 rgba(255,255,255,0.35);
  }
  .btn-yes:active { transform: scale(0.97); }
  .btn-yes::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shine 3s ease-in-out infinite 1.5s;
  }
  @keyframes shine {
    0%   { left: -100%; }
    100% { left: 200%; }
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0);
    animation: rippleEffect 0.6s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleEffect {
    to { transform: scale(4); opacity: 0; }
  }

  .btn-no {
    position: fixed;
    padding: 12px 30px;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    color: #c06080;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid rgba(220,130,160,0.4);
    border-radius: 50px;
    cursor: pointer;
    transition: box-shadow 0.2s ease, background 0.2s ease;
    box-shadow: 0 2px 12px rgba(220,130,160,0.12);
    letter-spacing: 0.02em;
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .btn-no:hover {
    background: rgba(255,240,245,0.85);
    box-shadow: 0 4px 18px rgba(220,130,160,0.22);
  }

  /* ===================== YES SCENE ===================== */
  #yes-scene {
    position: fixed; inset: 0;
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    background: #0d0019;
    transition: opacity 0.8s ease;
    overflow: hidden;
  }
  #yes-scene.active { opacity: 1; pointer-events: all; }

  /* Night gradient bg */
  .night-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 30%,
      #3a0058 0%, #1a0030 40%, #0d0019 100%);
    z-index: 0;
  }

  /* Stars */
  .night-stars { position: absolute; inset: 0; z-index: 1; }
  .nstar {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: starTwinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes starTwinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.5); }
  }

  /* Floating hearts in YES scene */
  .yes-heart {
    position: absolute;
    font-size: var(--sz);
    animation: yesHeartRise var(--dur) ease-in infinite var(--delay);
    z-index: 2;
    filter: drop-shadow(0 0 8px rgba(255,100,150,0.7));
  }
  @keyframes yesHeartRise {
    0%   { opacity: 0; transform: translateY(0) scale(0.4) rotate(var(--rot)); }
    15%  { opacity: 1; }
    85%  { opacity: 0.7; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.3) rotate(calc(var(--rot) + 180deg)); }
  }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    width: var(--w); height: var(--h);
    background: var(--c);
    border-radius: var(--r);
    animation: confettiFall var(--dur) ease-in infinite var(--delay);
    z-index: 3;
    top: -20px;
  }
  @keyframes confettiFall {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg) scaleX(1); }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(105vh) rotate(var(--spin)) scaleX(-1); }
  }

  /* Glow orbs in night scene */
  .night-orb {
    position: absolute;
    border-radius: 50%;
    background: var(--c);
    filter: blur(80px);
    opacity: 0.35;
    animation: orbPulse var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes orbPulse {
    0%,100% { transform: scale(1); opacity: 0.3; }
    50%     { transform: scale(1.3); opacity: 0.5; }
  }

  /* YES text content */
  .yes-content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 0 24px;
  }
  .yes-emoji {
    font-size: 5rem;
    display: block;
    opacity: 0;
    transform: scale(0) rotate(-15deg);
    animation: emojiPop 0.8s 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    filter: drop-shadow(0 0 20px rgba(255,100,150,0.8));
  }
  @keyframes emojiPop {
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .yes-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 700;
    color: #ff85a1;
    text-shadow:
      0 0 30px rgba(255,133,161,0.8),
      0 0 60px rgba(255,100,140,0.5),
      0 0 100px rgba(255,80,120,0.3);
    opacity: 0;
    animation: textGlow 1s 1.2s ease forwards;
    margin: 12px 0 8px;
  }
  @keyframes textGlow {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .yes-line2 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    color: #e8c0d8;
    opacity: 0;
    animation: textGlow 1s 2.4s ease forwards;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(232,192,216,0.5);
  }
  .yes-line3 {
    font-family: 'Lato', sans-serif;
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: #d4a8c8;
    opacity: 0;
    animation: textGlow 1s 3.6s ease forwards;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-shadow: 0 0 12px rgba(212,168,200,0.4);
  }

  /* Sparkle ring */
  .yes-sparkles {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    pointer-events: none;
    z-index: 5;
  }
  .ys {
    position: absolute;
    font-size: var(--sz);
    animation: sparkleOrbit var(--dur) linear infinite var(--delay);
    transform-origin: 150px 150px;
    left: calc(50% - var(--sz)/2);
    top: calc(50% - var(--sz)/2);
  }
  @keyframes sparkleOrbit {
    0%   { opacity: 0; transform: rotate(var(--start)) translateX(120px) scale(0); }
    20%  { opacity: 1; transform: rotate(calc(var(--start) + 60deg)) translateX(120px) scale(1); }
    80%  { opacity: 0.8; }
    100% { opacity: 0; transform: rotate(calc(var(--start) + 360deg)) translateX(130px) scale(0.5); }
  }

  /* Utility */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Heart beat decoration near title */
  .heart-deco {
    display: inline-block;
    animation: heartBeat 1.2s ease-in-out infinite;
  }
  @keyframes heartBeat {
